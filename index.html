<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永恒号 · 船舰终端</title>
<style>
:root {
  --bg: #0a0e17; --panel: #111827cc; --accent: #88ccff; --accent-weak: #88ccff44;
  --text: #d0d8e8; --dim: #556677; --warn: #ffaa5e; --danger: #ff6666; --ok: #44ff44;
  --glitch: #ff44aa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Consolas','Courier New','Microsoft YaHei',monospace;height:100vh;display:flex;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#header{min-height:48px;padding:9px 20px;border-bottom:1px solid var(--accent-weak);background:rgba(17,24,39,.72);font-size:13px;color:var(--accent);display:flex;justify-content:space-between;align-items:center;letter-spacing:.5px}
#clock{min-width:190px;border:1px solid rgba(136,204,255,.36);padding:2px 10px;text-align:right;color:var(--accent);letter-spacing:1px}
#clock::before{content:'SYS.TIME // ';color:var(--dim)}
#clock.glitch{color:var(--danger);border-color:rgba(255,102,102,.65)}
#terminal{flex:1;overflow-y:auto;padding:16px 20px;font-size:14px;line-height:2;scroll-behavior:smooth}
#terminal .sys{color:var(--accent)} #terminal .err{color:var(--danger)} #terminal .ok{color:var(--ok)}
#terminal .warn{color:var(--warn)} #terminal .dim{color:var(--dim)} #terminal .ghost{color:var(--dim);opacity:0.5;font-style:italic}
#terminal .glitch{color:var(--glitch);animation:glitch-text 0.3s ease}
#terminal .dark{color:#ffaa5e} #terminal .light{color:var(--accent)} #terminal .red{color:var(--danger)}
#terminal>div[class*="source-"]{margin:2px 0;padding-left:12px;border-left:2px solid transparent}
#terminal>.source-node-2b{border-left-color:var(--warn);background:rgba(255,170,94,.035)}
#terminal>.source-node-7f{border-left-color:var(--accent);background:rgba(136,204,255,.035)}
#terminal>.source-cache{border-left-color:var(--dim);background:rgba(85,102,119,.045)}
@keyframes glitch-text {
  0%,100%{opacity:1;transform:none}
  20%{opacity:0.8;transform:translateX(-2px)}
  40%{opacity:1;transform:translateX(2px)}
  60%{opacity:0.6;transform:translateX(-1px)}
  80%{opacity:0.9;transform:translateX(1px)}
}
#input-line{display:flex;align-items:center;padding:8px 20px 16px;border-top:1px solid var(--accent-weak)}
#prompt{color:var(--accent);font-size:14px;white-space:nowrap}
#cmd-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;margin-left:8px;caret-color:var(--accent)}
#cmd-input::placeholder{color:var(--dim)}
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-overlay::before,.login-overlay::after{content:'';position:absolute;top:0;bottom:0;width:1px;background:rgba(136,204,255,.12)}
.login-overlay::before{left:calc(50% - 260px)}.login-overlay::after{right:calc(50% - 260px)}
.login-box{position:relative;background:var(--panel);border:1px solid rgba(136,204,255,.45);padding:42px 40px;width:440px;text-align:left}
.login-box::before,.login-box::after{content:'';position:absolute;left:-18px;right:-18px;height:1px;background:rgba(136,204,255,.28)}
.login-box::before{top:14px}.login-box::after{bottom:14px}
.login-box h2{color:var(--accent);margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid rgba(136,204,255,.24);font-size:18px;letter-spacing:1px;text-align:center}
.auth-field{margin-bottom:16px}
.auth-field label{display:block;margin-bottom:6px;color:var(--dim);font-size:10px;letter-spacing:2px}
.login-box input{display:block;width:100%;padding:12px 16px;background:var(--bg);border:1px solid rgba(136,204,255,.35);border-radius:0;color:var(--text);font-family:inherit;font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent);outline:1px solid rgba(136,204,255,.22);outline-offset:2px}
.login-box button{width:100%;padding:12px;background:var(--accent-weak);border:1px solid var(--accent);border-radius:0;color:var(--accent);font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:4px}
.login-box button:hover,.login-box button:focus-visible{background:var(--accent);color:var(--bg);outline:none}
.login-box .guest-btn{margin-top:8px;padding:10px;background:transparent;border-color:rgba(136,204,255,.24);color:rgba(136,204,255,.62);font-size:13px;letter-spacing:2px}
.login-box .guest-btn:hover,.login-box .guest-btn:focus-visible{border-color:rgba(136,204,255,.72);background:transparent;color:var(--accent)}
.login-msg{font-size:13px;color:var(--danger);min-height:20px;margin-top:10px;text-align:center}
.login-msg:not(:empty){animation:auth-error .18s steps(2,end) 3}
.login-hint{font-size:11px;color:var(--dim);margin-top:14px;text-align:center;letter-spacing:.4px}
@keyframes auth-error{50%{color:var(--bg);background:var(--danger)}}
@media (prefers-reduced-motion:reduce){.login-msg:not(:empty),#terminal .glitch{animation:none}}
</style>
</head>
<body>
<div class="login-overlay" id="login-overlay">
<div class="login-box">
<h2>SYS::AUTH // 永恒号 · 船舰终端</h2>
<div class="auth-field"><label for="login-user">IDENT // 用户ID</label><input id="login-user" type="text" placeholder="输入授权标识" autofocus></div>
<div class="auth-field"><label for="login-pass">ACCESS // 访问密钥</label><input id="login-pass" type="password" placeholder="输入访问密钥"></div>
<button id="login-btn">验证身份</button><button id="guest-btn" class="guest-btn">访客浏览</button>
<div class="login-msg" id="login-msg"></div>
<div class="login-hint" id="login-hint">授权人员：林晨 · 林汐 · 陈远</div>
</div></div>
<div id="main">
<div id="header"><span>▸ 永恒号 · 船舰终端</span><span id="clock" class="dim"></span></div>
<div id="terminal"></div>
<div id="input-line"><span id="prompt">guest@永恒号:~$</span><input id="cmd-input" type="text" placeholder="/help 查看命令..." autofocus></div>
</div>

<script src="app.js"></script>
<script>
(() => {
  const terminal = document.getElementById('terminal');
  const prompt = document.getElementById('prompt');
  if (!terminal || !prompt || typeof MutationObserver === 'undefined') return;

  const sourceFromBatch = (lines) => {
    const cwd = prompt.textContent || '';
    if (/\/mnt\/0x2B/i.test(cwd)) return 'source-node-2b';
    if (/\/mnt\/7F-A3/i.test(cwd)) return 'source-node-7f';

    const text = lines.map((line) => line.textContent || '').join('\n');
    if (/建立安全连接到:\s*隔离节点\s*0x2B|文件系统已挂载至\s*\/mnt\/0x2B|已跳转至\s*\/mnt\/0x2B/i.test(text)) return 'source-node-2b';
    if (/建立安全连接到:.*7F-A3|文件系统已挂载至\s*\/mnt\/7F-A3|已跳转至\s*\/mnt\/7F-A3/i.test(text)) return 'source-node-7f';
    if (/船舰网页缓存系统|正在打开系统缓存|深空通讯链路中恢复的历史网页/i.test(text)) return 'source-cache';
    return '';
  };

  const observer = new MutationObserver((records) => {
    const lines = [];
    for (const record of records) {
      for (const node of record.addedNodes) {
        if (node instanceof HTMLElement) lines.push(node);
      }
    }
    const source = sourceFromBatch(lines);
    if (!source) return;
    for (const line of lines) line.classList.add(source);
  });

  observer.observe(terminal, { childList: true });
})();
</script>
</body>
</html>
