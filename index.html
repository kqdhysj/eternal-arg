<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永恒号 · 船舰终端</title>
<style>
:root {
  --bg: #0a0e17; --panel: #111827cc; --accent: #88ccff; --accent-weak: #88ccff44;
  --text: #d0d8e8; --dim: #556677; --warn: #ffaa5e; --danger: #ff6666; --ok: #44ff44;
  --glitch: #ff44aa;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Consolas','Courier New','Microsoft YaHei',monospace;height:100vh;display:flex;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#header{padding:12px 20px;border-bottom:1px solid var(--accent-weak);font-size:13px;color:var(--accent);display:flex;justify-content:space-between}
#terminal{flex:1;overflow-y:auto;padding:16px 20px;font-size:14px;line-height:1.7;scroll-behavior:smooth}
#terminal .sys{color:var(--accent)} #terminal .err{color:var(--danger)} #terminal .ok{color:var(--ok)}
#terminal .warn{color:var(--warn)} #terminal .dim{color:var(--dim)} #terminal .ghost{color:var(--dim);opacity:0.5;font-style:italic}
#terminal .glitch{color:var(--glitch);animation:glitch-text 0.3s ease}
#terminal .dark{color:#ffaa5e} #terminal .light{color:var(--accent)} #terminal .red{color:var(--danger)}
@keyframes glitch-text {
  0%,100%{opacity:1;transform:none}
  20%{opacity:0.8;transform:translateX(-2px)}
  40%{opacity:1;transform:translateX(2px)}
  60%{opacity:0.6;transform:translateX(-1px)}
  80%{opacity:0.9;transform:translateX(1px)}
}
#input-line{display:flex;align-items:center;padding:8px 20px 16px;border-top:1px solid var(--accent-weak)}
#prompt{color:var(--accent);font-size:14px;white-space:nowrap}
#cmd-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;font-size:14px;margin-left:8px;caret-color:var(--accent)}
#cmd-input::placeholder{color:var(--dim)}
.login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--panel);border:1px solid var(--accent-weak);padding:48px 40px;width:420px;text-align:center}
.login-box h2{color:var(--accent);margin-bottom:24px;font-size:18px}
.login-box input{display:block;width:100%;margin-bottom:14px;padding:12px 16px;background:var(--bg);border:1px solid var(--accent-weak);color:var(--text);font-family:inherit;font-size:14px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;background:var(--accent-weak);border:1px solid var(--accent);color:var(--accent);font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:4px}
.login-box button:hover{background:var(--accent);color:var(--bg)}
.login-msg{font-size:13px;color:var(--danger);min-height:20px;margin-top:8px}
.login-hint{font-size:11px;color:var(--dim);margin-top:16px}
@media(max-width:640px){
  .login-box{width:90vw;padding:32px 20px}
  .login-box h2{font-size:14px}
  #terminal{font-size:12px;padding:10px 12px}
  #header{padding:8px 12px;font-size:11px}
  #input-line{padding:6px 12px 12px}
  #cmd-input{font-size:12px}
  #prompt{font-size:11px}
}
</style>
</head>
<body>
<div class="login-overlay" id="login-overlay">
<div class="login-box">
<h2>SYS::AUTH // 永恒号 · 船舰终端</h2>
<input id="login-user" type="text" placeholder="用户ID" autofocus>
<input id="login-pass" type="password" placeholder="密码"><button id="login-btn">验证身份</button><button id="guest-btn" style="width:100%;padding:10px;background:transparent;border:1px solid rgba(136,204,255,.2);color:rgba(136,204,255,.5);font-family:inherit;font-size:13px;cursor:pointer;margin-top:8px;letter-spacing:2px;transition:all .2s" onmouseover="this.style.borderColor='rgba(136,204,255,.5)';this.style.color='rgba(136,204,255,.8)'" onmouseout="this.style.borderColor='rgba(136,204,255,.2)';this.style.color='rgba(136,204,255,.5)'">访客浏览</button>
<div class="login-msg" id="login-msg"></div>
<div class="login-hint" id="login-hint">授权人员：林晨 · 林汐 · 陈远</div>
</div></div>
<div id="main">
<div id="header"><span>▸ 永恒号 · 船舰终端</span><span id="clock" class="dim"></span></div>
<div id="terminal"></div>
<div id="input-line"><span id="prompt">guest@永恒号:~$</span><input id="cmd-input" type="text" placeholder="/help 查看命令..." autofocus></div>
</div>

<script src="app.js"></script>

</body>
</html>
